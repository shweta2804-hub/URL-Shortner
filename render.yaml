services:
  - type: web
    name: url-shortner
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app --worker-class gthread --workers 2 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/profile
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PRODUCTION
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: BASE_URL
        value: https://url-shortner.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortner-db
          property: connectionString

databases:
  - name: url-shortner-db
    databaseName: url_shortner
    region: oregon
    plan: free
    ipAllowList: []