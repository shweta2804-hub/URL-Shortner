services:
  - type: web
    name: study-material-hub
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app_fastapi:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 120
    healthCheckPath: /health
    envVars:
      - key: PRODUCTION
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: BASE_URL
        value: https://study-material-hub.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: study-material-hub-db
          property: connectionString

databases:
  - name: study-material-hub-db
    databaseName: study_material_hub
    region: oregon
    plan: free
    ipAllowList: []