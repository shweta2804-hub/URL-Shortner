<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Material Hub — Organize, Share & Track Resources</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom Theme -->
  <link rel="stylesheet" href="/static/style.css">

  <style>
    /* Inline fix to prevent FOUC */
    [data-theme="dark"] body { background: #0b1120; }
  </style>
</head>
<body>

  <!-- ===== SPLIT-SCREEN AUTH LAYOUT ===== -->
  <div class="auth-container">

    <!-- LEFT: Login Form -->
    <div class="auth-left">
      <div class="auth-card">
        <div class="card">

          <!-- Logo -->
          <div class="auth-logo">
            <div class="logo-icon">
              <i class="bi bi-link-45deg"></i>
            </div>
            <h2 class="text-gradient">Study Material Hub</h2>
            <p>Organize, share, and track your study resources</p>
          </div>

          <!-- Login Form -->
          <form onsubmit="handleLogin(event)" class="needs-validation" novalidate>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label" for="email">Email address</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="you@example.com"
                required
                autocomplete="email"
              >
              <div class="invalid-feedback"></div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label class="form-label" for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              >
              <div class="invalid-feedback"></div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100 py-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>

          </form>

          <!-- Footer -->
          <div class="auth-footer-text">
            Don't have an account?
            <a href="/register" class="fw-semibold">Create one</a>
          </div>

        </div>
      </div>
    </div>

    <!-- RIGHT: Illustration / Branding -->
    <div class="auth-right">
      <div class="auth-illustration">
        <div class="illustration-icon">
          <i class="bi bi-journal-bookmark-fill"></i>
        </div>
        <h3>Study Material Hub</h3>
        <p>
          Save, organize, and share your study resources with titles,
          categories, and subjects — all with real-time view tracking.
        </p>

        <!-- Feature badges -->
        <div class="feature-badges">
          <span class="feature-badge">
            <i class="bi bi-shield-check"></i> JWT Auth
          </span>
          <span class="feature-badge">
            <i class="bi bi-graph-up-arrow"></i> View Analytics
          </span>
          <span class="feature-badge">
            <i class="bi bi-database"></i> PostgreSQL
          </span>
          <span class="feature-badge">
            <i class="bi bi-search"></i> Search
          </span>
        </div>
      </div>
    </div>

  </div>

  <!-- ===== SCRIPTS ===== -->
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="/static/js/main.js"></script>

</body>
</html>
